<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Gen Converter</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: 100%; max-width: 500px; }
        textarea { width: 100%; height: 80px; padding: 10px; border-radius: 5px; border: none; margin-bottom: 15px; box-sizing: border-box; background: #2d2d2d; color: #00ff00; font-family: monospace; }
        .result-box { background: #2d2d2d; padding: 15px; border-radius: 5px; border: 1px dashed #555; cursor: pointer; position: relative; word-break: break-all; font-family: monospace; }
        .result-box:hover { background: #333; }
        .label { font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        .copy-hint { font-size: 0.7rem; color: #007bff; margin-top: 5px; text-align: right; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Fast Gen Tool ⚡</h2>
        
        <div class="label">Pega la info aquí:</div>
        <textarea id="inputData" placeholder="5343480495160466|07|2030|103" oninput="convertir()"></textarea>

        <div class="label">Resultado (Click para copiar):</div>
        <div class="result-box" id="output" onclick="copyToClipboard()">
            /gen ...
        </div>
        <div id="status" class="copy-hint">Esperando datos...</div>
    </div>

    <script>
        function convertir() {
            const input = document.getElementById('inputData').value.trim();
            const outputDiv = document.getElementById('output');
            const status = document.getElementById('status');

            if (input.includes('|')) {
                const parts = input.split('|');
                
                // Procesar la primera parte (tarjeta): deja los primeros 10 y pone 5-6 x
                const bin = parts[0].substring(0, 10) + "xxxxx";
                const mes = parts[1] || "xx";
                const ano = parts[2] || "xxxx";
                const cvv = "xxx"; // Siempre oculto según tu ejemplo

                const finalString = `/gen ${bin}|${mes}|${ano}|${cvv} 15`;
                outputDiv.innerText = finalString;
                status.innerText = "¡Listo para copiar!";
            } else {
                outputDiv.innerText = "/gen ...";
                status.innerText = "Formato no reconocido";
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('output').innerText;
            if (text !== "/gen ...") {
                navigator.clipboard.writeText(text).then(() => {
                    const status = document.getElementById('status');
                    status.innerText = "¡Copiado al portapapeles! ✅";
                    status.style.color = "#00ff00";
                    setTimeout(() => {
                        status.innerText = "¡Listo para copiar!";
                        status.style.color = "#007bff";
                    }, 2000);
                });
            }
        }
    </script>
</body>
</html>
